<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Scout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #e0e0e0; }

  /* Platform tabs */
  .platform-tabs {
    display: flex; gap: 0; background: #050505; border-bottom: 1px solid #1a1a1a;
    padding: 0 40px; position: sticky; top: 0; z-index: 200;
  }
  .platform-tab {
    padding: 14px 28px; border: none; background: transparent;
    color: #555; font-size: 0.95em; font-weight: 600; cursor: pointer;
    transition: all 0.2s; border-bottom: 3px solid transparent;
    display: flex; align-items: center; gap: 8px;
  }
  .platform-tab:hover { color: #999; background: #0a0a0a; }
  .platform-tab.active { color: #fff; border-bottom-color: var(--accent); }
  .platform-tab .tab-icon { font-size: 1.1em; }

  /* Per-platform accent color via CSS variable */
  :root { --accent: #3b82f6; }
  body.platform-tiktok { --accent: #3b82f6; }
  body.platform-reels { --accent: #e1306c; }
  body.platform-shorts { --accent: #ff0033; }

  /* Header */
  .header {
    padding: 24px 40px 20px;
    background: linear-gradient(135deg, #0a0a0a, #111);
    border-bottom: 1px solid #1a1a1a;
    position: sticky; top: 49px; z-index: 100;
  }
  .header h1 { font-size: 1.6em; color: #fff; margin-bottom: 4px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .header h1:hover { color: var(--accent); }
  .header p { color: #666; font-size: 0.9em; }

  /* Instagram gradient text */
  .ig-gradient {
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* YouTube icon */
  .yt-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 22px; background: #ff0033; border-radius: 5px; position: relative;
  }
  .yt-icon::after {
    content: ''; display: block; width: 0; height: 0;
    border-left: 8px solid #fff; border-top: 5px solid transparent; border-bottom: 5px solid transparent; margin-left: 2px;
  }

  /* Search */
  .search-row { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
  #niche-input {
    flex: 1; padding: 10px 16px; border-radius: 10px; border: 1px solid #333;
    background: #111; color: #fff; font-size: 0.95em; outline: none; transition: border-color 0.2s;
  }
  #niche-input:focus { border-color: var(--accent); }
  #niche-input::placeholder { color: #444; }
  #search-btn {
    padding: 10px 20px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-weight: 600; font-size: 0.85em;
    cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
  }
  #search-btn:hover { opacity: 0.85; }
  #search-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #brief-btn {
    padding: 10px 16px; border-radius: 10px; border: 1px solid #4a2a12;
    background: #24160b; color: #fdba74; font-weight: 600; font-size: 0.85em;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  #brief-btn:hover { background: #35200f; color: #fed7aa; border-color: #6b3a17; }
  #settings-btn {
    padding: 10px 16px; border-radius: 10px; border: 1px solid #333;
    background: transparent; color: #666; font-size: 0.85em; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  #settings-btn:hover { border-color: #555; color: #999; }

  .settings-panel {
    display: none; margin-top: 12px; padding: 16px; background: #0d0d0d;
    border: 1px solid #222; border-radius: 10px;
  }
  .settings-panel.open { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .settings-panel label { font-size: 0.8em; color: #888; margin-right: 4px; }
  .settings-panel input {
    flex: 1; min-width: 200px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #fff; font-size: 0.85em; font-family: monospace;
  }
  .settings-panel button {
    padding: 8px 16px; border-radius: 8px; border: none;
    background: #22c55e; color: #000; font-weight: 600; font-size: 0.8em; cursor: pointer;
  }
  #token-status { font-size: 0.8em; color: #22c55e; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid #333;
    background: transparent; color: #999; cursor: pointer; font-size: 0.85em; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: #555; color: #fff; }
  .filter-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
  .sort-select {
    margin-left: auto; padding: 6px 12px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #999; font-size: 0.85em; cursor: pointer;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px; padding: 20px 40px 60px;
  }

  /* Card */
  .card {
    background: #111; border: 1px solid #1a1a1a; border-radius: 16px;
    overflow: hidden; transition: all 0.2s;
  }
  .card:hover { border-color: #333; transform: translateY(-2px); }
  .card-embed {
    width: 100%; aspect-ratio: 9/14; background: #0a0a0a;
    position: relative; overflow: hidden; cursor: pointer; max-height: 420px;
  }
  .card-embed iframe { width: 100%; height: 100%; border: none; }
  .card-embed .thumbnail { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
  .card-embed:hover .thumbnail { transform: scale(1.03); }
  .card-embed .placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, #0a0a0a, #151520); cursor: pointer; transition: background 0.2s;
  }
  .card-embed .placeholder:hover { background: linear-gradient(135deg, #111, #1a1a2e); }
  .play-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center; font-size: 1.4em;
  }
  .placeholder-text { color: #555; font-size: 0.8em; }
  .thumbnail-overlay {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: rgba(0,0,0,0.2);
    opacity: 0; transition: opacity 0.3s;
  }
  .card-embed:hover .thumbnail-overlay { opacity: 1; }

  .card-body { padding: 12px; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .card-category {
    font-size: 0.7em; padding: 3px 10px; border-radius: 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .card-author { color: #666; font-size: 0.8em; }
  .card-text {
    color: #999; font-size: 0.85em; line-height: 1.4; margin-bottom: 12px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-stats { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-weight: 700; color: #fff; font-size: 0.85em; }
  .stat-label { font-size: 0.6em; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

  .card-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 7px 6px; border-radius: 8px; border: none;
    font-size: 0.75em; font-weight: 600; cursor: pointer; transition: all 0.2s;
    text-align: center; text-decoration: none; display: block;
  }
  .btn-copy { background: #1a1a2e; color: #a78bfa; }
  .btn-copy:hover { background: #252540; }
  .btn-copy.copied { background: #102010; color: #86efac; }
  .btn-pollo { background: #24160b; color: #fdba74; }
  .btn-pollo:hover { background: #35200f; color: #fed7aa; }
  .btn-open { background: #1a1a1a; color: #999; }
  .btn-open:hover { background: #252525; color: #fff; }

  .duration-badge {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px;
    border-radius: 4px; font-size: 0.75em; font-weight: 600; z-index: 2;
  }
  .star-btn {
    position: absolute; top: 8px; right: 8px; z-index: 3;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: none;
    color: #555; font-size: 1.1em; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .star-btn:hover { color: #fcd34d; background: rgba(0,0,0,0.8); }
  .star-btn.starred { color: #fcd34d; }

  .platform-badge {
    position: absolute; top: 8px; left: 8px; z-index: 3;
    padding: 3px 8px; border-radius: 6px; font-size: 0.65em;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    background: rgba(0,0,0,0.7); color: #fff;
  }
  .views-badge {
    position: absolute; top: 8px; left: 8px; z-index: 3;
    background: rgba(0,0,0,0.7); color: #fff; padding: 3px 8px;
    border-radius: 6px; font-size: 0.7em; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }

  /* Loading */
  .loading-bar {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 1000;
    background: linear-gradient(90deg, var(--accent), #fff, var(--accent));
    display: none;
  }
  .loading-bar.active { display: block; animation: loadPulse 1.5s ease-in-out infinite; }
  @keyframes loadPulse { 0% { width: 10%; } 50% { width: 70%; } 100% { width: 90%; } }

  .loading-spinner { grid-column: 1 / -1; text-align: center; padding: 60px 20px; }
  .spinner {
    display: inline-block; width: 40px; height: 40px;
    border: 3px solid #222; border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #555; margin-top: 12px; font-size: 0.9em; }

  .empty { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #444; }
  .empty .empty-icon { font-size: 3em; margin-bottom: 12px; opacity: 0.3; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; padding: 16px; }
    .header { padding: 16px 16px 12px; }
    .search-row { flex-wrap: wrap; }
    #niche-input { flex-basis: 100%; }
    .platform-tabs { padding: 0 16px; }
    .platform-tab { padding: 12px 16px; font-size: 0.85em; }
  }
</style>

// ─── HELPERS ───
function formatNum(n) {
  if (n >= 1000000000) return (n/1000000000).toFixed(1).replace('.0','') + 'B';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'K';
  return n.toString();
}

function formatDuration(s) {
  if (!s) return '';
  const m = Math.floor(s/60);
  const sec = s % 60;
  return m + ':' + sec.toString().padStart(2,'0');
}

function parseDuration(dur) {
  if (!dur) return '';
  if (/^\d+:\d{2}(:\d{2})?$/.test(dur)) return dur;
  const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return dur;
  const h = parseInt(m[1] || 0), min = parseInt(m[2] || 0), sec = parseInt(m[3] || 0);
  if (h > 0) return h + ':' + min.toString().padStart(2,'0') + ':' + sec.toString().padStart(2,'0');
  return min + ':' + sec.toString().padStart(2,'0');
}

function firstValue(...values) {
  return values.find(value => value !== undefined && value !== null && value !== '');
}

function numberValue(...values) {
  const value = firstValue(...values);
  if (typeof value === 'number') return value;
  if (typeof value === 'string') {
    const parsed = Number(value.replace(/,/g, ''));
    return Number.isFinite(parsed) ? parsed : 0;
  }
  return 0;
}

function textValue(value) {
  if (!value) return '';
  if (typeof value === 'string') return value;
  if (typeof value === 'object') return value.text || value.caption || '';
  return String(value);
}

function extractInstagramCode(item) {
  const direct = firstValue(item.code, item.shortcode, item.shortCode);
  if (direct) return String(direct);
  const url = firstValue(item.url, item.reel_url, item.reelUrl, item.permalink);
  const match = String(url || '').match(/instagram\.com\/(?:reel|p)\/([^/?#]+)/i);
  return match?.[1] || '';
}

function instagramUrlFromItem(item) {
  const url = firstValue(item.url, item.reel_url, item.reelUrl, item.permalink);
  if (url) return String(url);
  const code = extractInstagramCode(item);
  return code ? `https://www.instagram.com/reel/${code}/` : '';
}

function instagramEmbedUrlFromItem(item) {
  const code = extractInstagramCode(item);
  return code ? `https://www.instagram.com/reel/${code}/embed/captioned/` : '';
}

function normalizeReelItem(item, category, index = 0) {
  const code = extractInstagramCode(item);
  const url = instagramUrlFromItem(item);
  const id = String(firstValue(item.id, item.pk, code, `ig_${index}_${Math.random().toString(36).slice(2)}`));
  const user = item.user || item.owner || item.author || {};
  const caption = textValue(firstValue(item.caption, item.caption_text, item.captionText, item.description, item.text));
  const takenAt = firstValue(item.taken_at, item.takenAt, item.timestamp, item.taken_at_timestamp);

  return {
    id,
    category,
    caption: caption.slice(0, 300),
    likesCount: numberValue(item.like_count, item.likes_count, item.likesCount, item.likes),
    viewsCount: numberValue(item.ig_play_count, item.play_count, item.views_count, item.viewsCount, item.video_view_count, item.plays),
    commentsCount: numberValue(item.comment_count, item.comments_count, item.commentsCount, item.comments),
    shareCount: numberValue(item.share_count, item.shares_count, item.shareCount, item.shares),
    username: firstValue(user.username, item.username, item.ownerUsername, item.owner_username, ''),
    fullName: firstValue(user.full_name, user.fullName, item.fullName, item.ownerFullName, ''),
    url,
    displayUrl: firstValue(item.thumbnail_url, item.thumbnailUrl, item.display_url, item.displayUrl, item.image_url, ''),
    timestamp: typeof takenAt === 'number' ? new Date(takenAt * 1000).toISOString() : firstValue(takenAt, item.taken_at_date, item.date, new Date().toISOString()),
    videoDuration: Math.round(numberValue(item.video_duration, item.videoDuration, item.duration)),
    type: 'Reel'
  };
}

function catClass(cat) {
  if (!catColors[cat]) {
    const c = colorPool[colorIndex % colorPool.length];
    catColors[cat] = c;
    colorIndex++;
    const style = document.createElement('style');
    const cls = 'cat-' + cat.toLowerCase().replace(/[^a-z0-9]/g, '-');
    style.textContent = `.${cls} { background: ${c.bg}; color: ${c.fg}; }`;
    document.head.appendChild(style);
  }
  return 'cat-' + cat.toLowerCase().replace(/[^a-z0-9]/g, '-');
}

let starredVideos = [];

function starsKey() { return currentPlatform + '_stars'; }

async function loadStars() {
  try {
    const resp = await fetch('/api/stars/' + currentPlatform);
    if (resp.ok) {
      starredVideos = await resp.json();
      starredIds = starredVideos.map(v => v.id);
      localStorage.setItem(starsKey() + '_ids', JSON.stringify(starredIds));
      localStorage.setItem(starsKey() + '_videos', JSON.stringify(starredVideos));
      return;
    }
  } catch {}
  try { starredIds = JSON.parse(localStorage.getItem(starsKey() + '_ids') || '[]'); } catch { starredIds = []; }
  try { starredVideos = JSON.parse(localStorage.getItem(starsKey() + '_videos') || '[]'); } catch { starredVideos = []; }
}

    starredIds.push(id);
    const video = currentVideos.find(v => v.id === id);
    if (video) starredVideos.push(video);
    btn.classList.add('starred');
  }
  localStorage.setItem(starsKey() + '_ids', JSON.stringify(starredIds));
  localStorage.setItem(starsKey() + '_videos', JSON.stringify(starredVideos));
  try { fetch('/api/stars/' + currentPlatform, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(starredVideos) }); } catch {}
}

  // All

  allBtn.className = 'filter-btn active';

    allBtn.classList.add('active');

  const categories = [
    ...(pinnedCategories[currentPlatform] || []),
    ...currentVideos.map(v => v.category).filter(Boolean),
  ].filter((cat, index, arr) => arr.indexOf(cat) === index);
  if (categories.length > 1) {
    categories.forEach(cat => {
      const btn = document.createElement('button');

      btn.textContent = cat;
      btn.dataset.filter = cat;
      btn.addEventListener('click', () => {

// ─── RENDER CARDS (platform-aware) ───
function renderCards(filter, sort) {
  const grid = document.getElementById('grid');
  let filtered;

  if (filter === 'all') filtered = [...currentVideos];
  else if (filter === 'favorites') {
    filtered = getFavoriteVideos();
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty"><div class="empty-icon">&#9734;</div>No starred videos yet — click the star on any video to save it</div>';
      return;
    }
  } else {
    filtered = currentVideos.filter(v => v.category === filter);
  }

  // Platform-specific sorting
  filtered = sortVideos(filtered, sort);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No videos found</div>';
    return;
  }

  grid.innerHTML = filtered.map((v, i) => renderCard(v, i)).join('');
}

function sortVideos(arr, sort) {
  const copy = [...arr];
  if (currentPlatform === 'tiktok') {
    if (sort === 'plays') copy.sort((a,b) => (b.playCount||0) - (a.playCount||0));
    else if (sort === 'likes') copy.sort((a,b) => (b.diggCount||0) - (a.diggCount||0));
    else if (sort === 'shares') copy.sort((a,b) => (b.shareCount||0) - (a.shareCount||0));
    else if (sort === 'recent') copy.sort((a,b) => new Date(b.createTimeISO||0) - new Date(a.createTimeISO||0));
  } else if (currentPlatform === 'reels') {
    if (sort === 'likes') copy.sort((a,b) => (b.likesCount||0) - (a.likesCount||0));
    else if (sort === 'views') copy.sort((a,b) => (b.viewsCount||0) - (a.viewsCount||0));
    else if (sort === 'comments') copy.sort((a,b) => (b.commentsCount||0) - (a.commentsCount||0));
    else if (sort === 'shares') copy.sort((a,b) => (b.shareCount||0) - (a.shareCount||0));
    else if (sort === 'recent') copy.sort((a,b) => new Date(b.timestamp||0) - new Date(a.timestamp||0));
  } else if (currentPlatform === 'shorts') {
    if (sort === 'views') copy.sort((a,b) => (b.viewCount||0) - (a.viewCount||0));
    else if (sort === 'likes') copy.sort((a,b) => (b.likeCount||0) - (a.likeCount||0));
    else if (sort === 'comments') copy.sort((a,b) => (b.commentCount||0) - (a.commentCount||0));
    else if (sort === 'recent') copy.sort((a,b) => new Date(b.publishedAt||0) - new Date(a.publishedAt||0));
  }
  return copy;
}

function loadShortsEmbed(videoId) {

  const placeholder = container.querySelector('.placeholder');
  if (placeholder) {
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
    iframe.allowFullscreen = true;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';

function loadReelsEmbed(id) {
  const container = document.getElementById('embed-' + id);
  if (!container || container.querySelector('iframe')) return;
  const embedUrl = container.dataset.reelEmbed;
  if (!embedUrl) {
    const reel = currentVideos.find(v => v.id === id) || starredVideos.find(v => v.id === id);
    if (reel?.url) window.open(reel.url, '_blank', 'noopener');
    return;
  }

  const iframe = document.createElement('iframe');
  iframe.src = embedUrl;
  iframe.allowFullscreen = true;
  iframe.allow = 'clipboard-write; encrypted-media; picture-in-picture';
  iframe.loading = 'lazy';
  container.querySelectorAll('.placeholder, .thumbnail, .thumbnail-overlay').forEach(el => el.remove());
  container.prepend(iframe);
}

function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy URL'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyUrlToPollo(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'Copied URL';
    window.open('https://pollo.ai/app/ai-agent', '_blank', 'noopener');
    setTimeout(() => { btn.textContent = 'Pollo'; }, 2400);

function reelPromptBlock(reel, index) {

// ─── LAZY LOAD ───
function setupLazyLoad() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const container = entry.target;
        const videoId = container.dataset.videoId;
        if (!container.querySelector('iframe')) {
          if (currentPlatform === 'tiktok') {
            if (container.querySelector('.placeholder')) {
              container.innerHTML = `<iframe src="https://www.tiktok.com/player/v1/${videoId}?hide_share=1&hide_like=1&hide_comment=1&hide_music=1" allowfullscreen allow="encrypted-media"></iframe>`;
            }
          } else if (currentPlatform === 'reels') {
            loadReelsEmbed(container.id.replace(/^embed-/, ''));
          } else if (currentPlatform === 'shorts') {
            if (!container.querySelector('.placeholder')) return;
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1`;
            iframe.allowFullscreen = true;
            iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            container.querySelector('.placeholder').replaceWith(iframe);
          }
        }
        observer.unobserve(container);
      }
    });
  }, { rootMargin: '200px' });

  document.querySelectorAll('.card-embed').forEach(el => {
    const canLazyLoad = (el.dataset.videoId && el.querySelector('.placeholder')) || (el.dataset.reelEmbed && !el.querySelector('iframe'));
    if (canLazyLoad) observer.observe(el);
  });
}

async function searchNiche() {
  const query = document.getElementById('niche-input').value.trim();
  if (!query) return;

  const token = localStorage.getItem('apify_token');
  if (!token && currentPlatform !== 'reels') {
    toggleSettings();
    document.getElementById('token-status').textContent = 'Enter your Apify token first';
    document.getElementById('token-status').style.color = '#ef4444';
    setTimeout(() => { document.getElementById('token-status').textContent = ''; document.getElementById('token-status').style.color = '#22c55e'; }, 3000);
    return;
  }

  const btn = document.getElementById('search-btn');
  const loadingBar = document.getElementById('loading-bar');
  btn.disabled = true;
  loadingBar.classList.add('active');

  const cfg = platformConfig[currentPlatform];
  btn.textContent = 'Searching...';
  document.getElementById('subtitle').textContent = `Searching for "${query}"...`;

  const grid = document.getElementById('grid');
  grid.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Searching for "${query}"...</div></div>`;

  const resultsLimit = getResultsCount();
  const categoryLabel = pendingSearchCategory || query.charAt(0).toUpperCase() + query.slice(1);
  pendingSearchCategory = '';

  try {
    let items = [];

    if (currentPlatform === 'tiktok') {
      items = await searchTikTok(query, token, resultsLimit, btn, categoryLabel);
    } else if (currentPlatform === 'reels') {
      items = await searchReels(query, token, resultsLimit, btn, categoryLabel);
    } else if (currentPlatform === 'shorts') {
      items = await searchShorts(query, token, resultsLimit, btn, categoryLabel);
    }

    if (items.length === 0) throw new Error('No results found. Try a different keyword.');

    currentVideos = items;
    buildFilterButtons();
    renderCards('all', document.getElementById('sort-select').value);
    setupLazyLoad();
    document.getElementById('subtitle').textContent = `${items.length} results found for "${query}"`;

  } catch (err) {
    document.getElementById('subtitle').textContent = `Error: ${err.message}`;
    grid.innerHTML = `<div class="empty">Search failed: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = cfg.searchLabel;
    loadingBar.classList.remove('active');
  }
}

function apifyHeaders(token) {
  return {
    'Content-Type': 'application/json',
    Authorization: `Bearer ${token}`
  };
}

async function pollDataset(token, datasetId, limit, btn, platformLabel, maxAttempts = 30) {
  let items = [];
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    await new Promise(r => setTimeout(r, 3000));
    const resp = await fetch(`https://api.apify.com/v2/datasets/${datasetId}/items?limit=${limit}&format=json`, {
      headers: apifyHeaders(token)
    });
    items = await resp.json();
    if (items.length > 0) break;
    btn.textContent = `Searching ${platformLabel}... (${(attempt+1)*3}s)`;
    const lt = document.querySelector('.loading-text');
    if (lt) lt.textContent = btn.textContent;
  }
  return items;
}

async function searchTikTok(query, token, limit, btn, categoryLabel) {
  const runResp = await fetch(`https://api.apify.com/v2/acts/clockworks~tiktok-scraper/runs`, {
    method: 'POST', headers: apifyHeaders(token),
    body: JSON.stringify({ searchQueries: [query], resultsPerPage: limit, shouldDownloadCovers: false, shouldDownloadSlideshowImages: false, shouldDownloadSubtitles: false, shouldDownloadVideos: false })
  });
  const runData = await runResp.json();
  const datasetId = runData.data?.defaultDatasetId;
  if (!datasetId) throw new Error('No dataset returned');

  const items = await pollDataset(token, datasetId, limit, btn, 'TikTok');
  const niceName = categoryLabel || query.charAt(0).toUpperCase() + query.slice(1);
  return items.map(item => ({
    id: item.id || '', category: niceName,
    text: (item.text || '').slice(0, 200),
    playCount: item.playCount || 0, diggCount: item.diggCount || 0,
    shareCount: item.shareCount || 0, commentCount: item.commentCount || 0,
    url: item.webVideoUrl || '', author: item.authorMeta?.name || '',
    authorNickname: item.authorMeta?.nickName || '', coverUrl: '',
    createTimeISO: item.createTimeISO || '', duration: item.videoMeta?.duration || 0,
  })).filter(v => v.id && v.url);
}

async function searchReels(query, token, limit, btn, categoryLabel) {
  btn.textContent = 'Searching Instagram...';
  const loadingText = document.querySelector('.loading-text');
  if (loadingText) loadingText.textContent = 'Searching Instagram Reels... this can take 15-30s';
  try {
    const response = await fetch('/api/reels/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, limit })
    });
    const data = await response.json().catch(() => ({}));
    if (response.ok) {
      const niceName = categoryLabel || query.charAt(0).toUpperCase() + query.slice(1);
      return (data.items || [])
        .map((item, index) => normalizeReelItem(item, niceName, index))
        .filter(v => v.id && v.url);
    }
    if (!token) throw new Error(data.error || 'Server Reels search failed. Add APIFY_TOKEN on the server or save a local token in settings.');
  } catch (error) {
    if (!token) throw error;
    btn.textContent = 'Server unavailable, trying local token...';
  }

  const maxPages = Math.max(1, Math.ceil(limit / 12));
  const actors = [
    {
      id: 'data-slayer~instagram-search-reels',
      input: { query }
    },
    {
      id: 'patient_discovery~instagram-search-reels',
      input: { query, maxPages }
    }
  ];

  let datasetId = '';
  let lastError = '';

  for (const actor of actors) {
    btn.textContent = `Starting Instagram actor...`;
    const runResp = await fetch(`https://api.apify.com/v2/acts/${actor.id}/runs`, {
      method: 'POST',
      headers: apifyHeaders(token),
      body: JSON.stringify(actor.input)
    });

    if (!runResp.ok) {
      const errBody = await runResp.json().catch(() => ({}));
      lastError = errBody.error?.message || `Failed to start ${actor.id}`;
      continue;
    }

    const runData = await runResp.json();
    datasetId = runData.data?.defaultDatasetId || '';
    if (datasetId) {
      const items = await pollDataset(token, datasetId, limit, btn, 'Instagram');
      if (items.length > 0) {
        const niceName = categoryLabel || query.charAt(0).toUpperCase() + query.slice(1);
        return items
          .map((item, index) => normalizeReelItem(item, niceName, index))
          .filter(v => v.id && v.url);
      }
      lastError = `${actor.id} returned no Reels`;
      continue;
    }
    lastError = `No dataset returned from ${actor.id}`;
  }

  if (!datasetId) throw new Error(lastError || 'No Instagram dataset returned');
  throw new Error(lastError || 'No Instagram Reels returned');
}

async function searchShorts(query, token, limit, btn, categoryLabel) {
  const runResp = await fetch(`https://api.apify.com/v2/acts/powerai~youtube-search-scraper/runs`, {
    method: 'POST', headers: apifyHeaders(token),
    body: JSON.stringify({ query, resultType: 'shorts', maxResults: Math.max(15, limit) })
  });
  if (!runResp.ok) {
    const errBody = await runResp.json().catch(() => ({}));
    throw new Error(errBody.error?.message || 'Failed to start scraper.');
  }
  const runData = await runResp.json();
  const datasetId = runData.data?.defaultDatasetId;
  if (!datasetId) throw new Error('No dataset returned');

  const items = await pollDataset(token, datasetId, limit * 2, btn, 'YouTube');
  const shortsOnly = items.filter(item => item.type === 'shorts');
  if (shortsOnly.length === 0) throw new Error('No Shorts found.');

  const niceName = categoryLabel || query.charAt(0).toUpperCase() + query.slice(1);
  return shortsOnly.map(item => {
    const videoId = item.videoId || '';
    return {
      id: videoId, videoId,
      category: niceName, title: (item.title || '').slice(0, 200),
      description: (item.description || '').slice(0, 300),
      viewCount: parseInt(item.viewCount) || 0, likeCount: 0, commentCount: 0,
      channelTitle: item.channelTitle || '', channelId: item.channelId || '',
      publishedAt: item.publishedAt || item.publishDate || '',
      duration: item.lengthText || '',
      url: `https://www.youtube.com/shorts/${videoId}`, isShort: true
    };
  }).filter(v => v.id);
}
