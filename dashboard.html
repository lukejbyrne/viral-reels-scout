<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Reels Scout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #e0e0e0; }

  /* Header */
  .header {
    padding: 32px 40px 24px;
    background: linear-gradient(135deg, #0a0a0a, #111);
    border-bottom: 1px solid #1a1a1a;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 1.8em; color: #fff; margin-bottom: 4px; cursor: pointer; }
  .header h1:hover { color: #e1306c; }
  .header h1 .ig-gradient {
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: #666; font-size: 0.9em; }

  /* Search */
  .search-row {
    display: flex; gap: 8px; margin-top: 16px; align-items: center;
  }
  #niche-input {
    flex: 1; padding: 10px 16px; border-radius: 10px; border: 1px solid #333;
    background: #111; color: #fff; font-size: 0.95em; outline: none;
    transition: border-color 0.2s;
  }
  #niche-input:focus { border-color: #e1306c; }
  #niche-input::placeholder { color: #444; }
  #search-btn {
    padding: 10px 20px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    color: #fff; font-weight: 600; font-size: 0.85em;
    cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
  }
  #search-btn:hover { opacity: 0.85; }
  #search-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #settings-btn {
    padding: 10px 16px; border-radius: 10px; border: 1px solid #333;
    background: transparent; color: #666; font-size: 0.85em; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  #settings-btn:hover { border-color: #555; color: #999; }

  .settings-panel {
    display: none; margin-top: 12px; padding: 16px; background: #0d0d0d;
    border: 1px solid #222; border-radius: 10px;
  }
  .settings-panel.open { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .settings-panel label { font-size: 0.8em; color: #888; margin-right: 4px; }
  .settings-panel input {
    flex: 1; min-width: 200px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #fff; font-size: 0.85em;
    font-family: monospace;
  }
  .settings-panel button {
    padding: 8px 16px; border-radius: 8px; border: none;
    background: #22c55e; color: #000; font-weight: 600; font-size: 0.8em; cursor: pointer;
  }
  #token-status { font-size: 0.8em; color: #22c55e; }

  /* Filters */
  .filters {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid #333;
    background: transparent; color: #999; cursor: pointer; font-size: 0.85em;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: #555; color: #fff; }
  .filter-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 600; }

  .sort-select {
    margin-left: auto; padding: 6px 12px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #999; font-size: 0.85em;
    cursor: pointer;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    padding: 20px 40px 60px;
  }

  /* Card */
  .card {
    background: #111; border: 1px solid #1a1a1a; border-radius: 16px;
    overflow: hidden; transition: all 0.2s;
  }
  .card:hover { border-color: #333; transform: translateY(-2px); }

  .card-embed {
    width: 100%; aspect-ratio: 9/16; background: #0a0a0a;
    position: relative; overflow: hidden; cursor: pointer;
    max-height: 400px;
  }
  .card-embed iframe { width: 100%; height: 100%; border: none; }
  .card-embed .thumbnail {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s;
  }
  .card-embed:hover .thumbnail { transform: scale(1.03); }
  .card-embed .placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, #0a0a0a, #1a0a15);
    cursor: pointer; transition: background 0.2s;
  }
  .card-embed .placeholder:hover { background: linear-gradient(135deg, #111, #2a1020); }
  .play-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4em;
  }
  .placeholder-text { color: #555; font-size: 0.8em; }
  .thumbnail-overlay {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: rgba(0,0,0,0.2);
    opacity: 0; transition: opacity 0.3s;
  }
  .card-embed:hover .thumbnail-overlay { opacity: 1; }

  .card-body { padding: 12px; }

  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .card-category {
    font-size: 0.7em; padding: 3px 10px; border-radius: 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .card-author { color: #666; font-size: 0.8em; }

  .card-text {
    color: #999; font-size: 0.85em; line-height: 1.4;
    margin-bottom: 12px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .card-stats { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-weight: 700; color: #fff; font-size: 0.85em; }
  .stat-label { font-size: 0.6em; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

  .card-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 7px 6px; border-radius: 8px; border: none;
    font-size: 0.75em; font-weight: 600; cursor: pointer; transition: all 0.2s;
    text-align: center; text-decoration: none; display: block;
  }
  .btn-copy { background: #1a0a1a; color: #e1306c; }
  .btn-copy:hover { background: #2a1020; }
  .btn-copy.copied { background: #102010; color: #86efac; }
  .btn-open { background: #1a1a1a; color: #999; }
  .btn-open:hover { background: #252525; color: #fff; }

  .duration-badge {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px;
    border-radius: 4px; font-size: 0.75em; font-weight: 600;
    z-index: 2;
  }

  /* Star / Favorites */
  .star-btn {
    position: absolute; top: 8px; right: 8px; z-index: 3;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: none;
    color: #555; font-size: 1.1em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .star-btn:hover { color: #fcd34d; background: rgba(0,0,0,0.8); }
  .star-btn.starred { color: #fcd34d; }

  /* Reel type badge */
  .reel-type-badge {
    position: absolute; top: 8px; left: 8px; z-index: 3;
    padding: 3px 8px; border-radius: 6px; font-size: 0.65em;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    background: rgba(225,48,108,0.85); color: #fff;
  }

  /* Empty state */
  .empty {
    grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #444;
  }
  .empty .empty-icon { font-size: 3em; margin-bottom: 12px; opacity: 0.3; }

  /* Loading spinner */
  .loading-bar {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 1000;
    background: linear-gradient(90deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    transition: width 0.3s;
    display: none;
  }
  .loading-bar.active { display: block; animation: loadPulse 1.5s ease-in-out infinite; }
  @keyframes loadPulse {
    0% { width: 10%; }
    50% { width: 70%; }
    100% { width: 90%; }
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; padding: 16px; }
    .header { padding: 20px 16px 16px; }
  }
</style>
</head>

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'K';
  return n.toString();
}

function formatDuration(s) {
  if (!s) return '';
  const m = Math.floor(s/60);
  const sec = s % 60;
  return m + ':' + sec.toString().padStart(2,'0');
}

// Dynamic category colors
const catColors = {};
const colorPool = [
  { bg: '#1a1030', fg: '#a78bfa' },

  { bg: '#0a1a10', fg: '#6ee7b7' },
  { bg: '#1a0a0a', fg: '#fda4af' },
];
let colorIndex = 0;

function catClass(cat) {
  if (!catColors[cat]) {
    const c = colorPool[colorIndex % colorPool.length];
    catColors[cat] = c;
    colorIndex++;
    const style = document.createElement('style');
    const cls = 'cat-' + cat.toLowerCase().replace(/[^a-z0-9]/g, '-');
    style.textContent = `.${cls} { background: ${c.bg}; color: ${c.fg}; }`;
    document.head.appendChild(style);
  }
  return 'cat-' + cat.toLowerCase().replace(/[^a-z0-9]/g, '-');
}

// Favorites -- saves to localStorage AND server-side stars.json
let starredVideos = [];
let starredIds = [];

async function loadStars() {
  try {
    const resp = await fetch('/api/stars');
    if (resp.ok) {
      starredVideos = await resp.json();
      starredIds = starredVideos.map(v => v.id);
      localStorage.setItem('ig_favorite_ids', JSON.stringify(starredIds));
      localStorage.setItem('ig_favorite_videos', JSON.stringify(starredVideos));
      return;
    }
  } catch {}
  try { starredIds = JSON.parse(localStorage.getItem('ig_favorite_ids') || '[]'); } catch { starredIds = []; }
  try { starredVideos = JSON.parse(localStorage.getItem('ig_favorite_videos') || '[]'); } catch { starredVideos = []; }
}

function getFavoriteVideos() { return starredVideos; }
function isFavorite(id) { return starredIds.includes(id); }

async function toggleFavorite(id, btn) {
  if (starredIds.includes(id)) {
    starredIds = starredIds.filter(f => f !== id);
    starredVideos = starredVideos.filter(v => v.id !== id);
    btn.classList.remove('starred');
  } else {
    starredIds.push(id);
    const video = currentVideos.find(v => v.id === id);
    if (video) starredVideos.push(video);
    btn.classList.add('starred');
  }
  localStorage.setItem('ig_favorite_ids', JSON.stringify(starredIds));
  localStorage.setItem('ig_favorite_videos', JSON.stringify(starredVideos));
  try { fetch('/api/stars', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(starredVideos) }); } catch {}
}

// Niche management
const defaultNiches = ['Health & Fitness', 'Business', 'Cooking', 'Real Estate', 'Fashion', 'Gaming', 'Beauty', 'Travel', 'Finance', 'Pets', 'Comedy', 'Motivation'];

function getNiches() {
  try {
    const saved = localStorage.getItem('ig_niches');
    return saved ? JSON.parse(saved) : defaultNiches;
  } catch { return defaultNiches; }
}

function saveNiches() {
  const val = document.getElementById('niches-input').value.trim();
  if (val) {
    const niches = val.split(',').map(s => s.trim()).filter(Boolean);
    localStorage.setItem('ig_niches', JSON.stringify(niches));
    document.getElementById('niches-status').textContent = 'Saved!';
    setTimeout(() => { document.getElementById('niches-status').textContent = ''; }, 2000);
    buildFilterButtons();
  }
}

  if (val) {
    localStorage.setItem('ig_results_count', val);
    document.getElementById('results-status').textContent = 'Saved!';
    setTimeout(() => { document.getElementById('results-status').textContent = ''; }, 2000);
  }
}

function getResultsCount() {
  return parseInt(localStorage.getItem('ig_results_count') || '20', 10);
}

function quickSearch(query) {
  document.getElementById('niche-input').value = query;
  searchNiche();
}

function buildFilterButtons() {
  const row = document.getElementById('filters-row');
  const sortEl = document.getElementById('sort-select');
  row.innerHTML = '';

  // Starred button
  const favBtn = document.createElement('button');
  favBtn.className = 'filter-btn';
  favBtn.dataset.filter = 'favorites';
  favBtn.textContent = 'Starred';
  favBtn.style.color = '#fcd34d';
  favBtn.style.borderColor = '#fcd34d33';
  favBtn.addEventListener('click', () => {
    row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    favBtn.classList.add('active');
    renderCards('favorites', document.getElementById('sort-select').value);
  });
  row.appendChild(favBtn);

  // All button
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.dataset.filter = 'all';
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', () => {
    row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    renderCards('all', document.getElementById('sort-select').value);
  });
  row.appendChild(allBtn);

  // Category buttons from current data
  const categories = [...new Set(currentVideos.map(v => v.category))].filter(Boolean);
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.dataset.filter = cat;
    btn.addEventListener('click', () => {
      row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards(cat, document.getElementById('sort-select').value);
    });
    row.appendChild(btn);
  });

  // Divider
  const divider = document.createElement('span');
  divider.style.cssText = 'width:1px; height:20px; background:#333; margin:0 4px;';
  row.appendChild(divider);

  // Niche quick-search buttons
  getNiches().forEach(niche => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.style.borderStyle = 'dashed';
    btn.textContent = niche;
    btn.addEventListener('click', () => {
      row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      quickSearch(niche.toLowerCase());
    });
    row.appendChild(btn);
  });

  row.appendChild(sortEl);
  document.getElementById('niches-input').value = getNiches().join(', ');
}

function renderCards(filter, sort) {
  const grid = document.getElementById('grid');
  let filtered;
  if (filter === 'all') filtered = [...currentVideos];
  else if (filter === 'favorites') {
    filtered = getFavoriteVideos();
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty"><div class="empty-icon">&#9734;</div>No starred reels yet -- click the star on any reel to save it here</div>';
      return;
    }
  }
  else filtered = currentVideos.filter(v => v.category === filter);

  if (sort === 'likes') filtered.sort((a,b) => (b.likesCount||0) - (a.likesCount||0));
  else if (sort === 'views') filtered.sort((a,b) => (b.viewsCount||0) - (a.viewsCount||0));
  else if (sort === 'comments') filtered.sort((a,b) => (b.commentsCount||0) - (a.commentsCount||0));
  else if (sort === 'recent') filtered.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">&#128270;</div>No reels found for this filter</div>';
    return;
  }

  grid.innerHTML = filtered.map((v, i) => {
    const hasThumb = v.displayUrl && v.displayUrl.length > 10;
    const escapedId = (v.id || '').replace(/'/g, "\\'");
    const escapedUrl = (v.url || '').replace(/'/g, "\\'");

    return `
    <div class="card" data-category="${v.category || ''}">
      <div class="card-embed" id="embed-${v.id}">
        ${hasThumb
          ? `<img class="thumbnail" src="${v.displayUrl}" alt="Reel thumbnail" loading="${i < 6 ? 'eager' : 'lazy'}" onerror="this.style.display='none'" />
             <div class="thumbnail-overlay">
               <div class="play-icon">&#9654;</div>
             </div>`
          : `<div class="placeholder" onclick="window.open('${escapedUrl}', '_blank')">
              <div class="play-icon">&#9654;</div>
              <div class="placeholder-text">Click to view on Instagram</div>
            </div>`
        }
        ${v.videoDuration ? `<div class="duration-badge">${formatDuration(v.videoDuration)}</div>` : ''}
        <span class="reel-type-badge">${v.type || 'Reel'}</span>
        <button class="star-btn ${isFavorite(v.id) ? 'starred' : ''}" onclick="event.stopPropagation(); toggleFavorite('${escapedId}', this)">&#9733;</button>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-category ${catClass(v.category || 'Uncategorized')}">${v.category || 'Uncategorized'}</span>
          <span class="card-author">@${v.username || 'unknown'}</span>
        </div>
        <div class="card-text">${v.caption || 'No caption'}</div>
        <div class="card-stats">
          <div class="stat"><span class="stat-value">${formatNum(v.viewsCount || 0)}</span><span class="stat-label">Views</span></div>
          <div class="stat"><span class="stat-value">${formatNum(v.likesCount || 0)}</span><span class="stat-label">Likes</span></div>
          <div class="stat"><span class="stat-value">${formatNum(v.commentsCount || 0)}</span><span class="stat-label">Comments</span></div>
        </div>
        <div class="card-actions">
          <button class="btn btn-copy" onclick="copyUrl('${escapedUrl}', this)">Copy URL</button>
          <a class="btn btn-open" href="${v.url}" target="_blank" rel="noopener">Instagram</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy URL'; btn.classList.remove('copied'); }, 2000);
  });
}

// Sort change
document.getElementById('sort-select').addEventListener('change', (e) => {
  const activeFilter = document.querySelector('.filter-btn.active')?.dataset?.filter || 'all';
  renderCards(activeFilter, e.target.value);
});

// Settings panel
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function saveToken() {
  const token = document.getElementById('apify-token').value.trim();
  if (token) {
    localStorage.setItem('apify_token', token);
    document.getElementById('token-status').textContent = 'Saved!';
    setTimeout(() => { document.getElementById('token-status').textContent = ''; }, 2000);
  }
}

// Load saved token on start
(function() {
  const saved = localStorage.getItem('apify_token');
  if (saved) document.getElementById('apify-token').value = saved;
  const savedCount = localStorage.getItem('ig_results_count');
  if (savedCount) document.getElementById('results-count').value = savedCount;
})();

// Search niche via Apify Instagram Reels Scraper
async function searchNiche() {
  const query = document.getElementById('niche-input').value.trim();
  if (!query) return;

  const token = localStorage.getItem('apify_token');
  if (!token) {
    toggleSettings();
    document.getElementById('token-status').textContent = 'Enter your Apify token first';
    document.getElementById('token-status').style.color = '#ef4444';
    setTimeout(() => { document.getElementById('token-status').textContent = ''; document.getElementById('token-status').style.color = '#22c55e'; }, 3000);
    return;
  }

  const btn = document.getElementById('search-btn');
  const loadingBar = document.getElementById('loading-bar');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  loadingBar.classList.add('active');
  document.getElementById('subtitle').textContent = `Searching Instagram Reels for "${query}"...`;

  const resultsLimit = getResultsCount();

  try {
    // Use apify/instagram-hashtag-scraper to find reels by hashtag/keyword
    // This actor searches Instagram hashtags and returns posts including reels
    const runResp = await fetch(
      `https://api.apify.com/v2/acts/apify~instagram-hashtag-scraper/runs?token=${token}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          hashtags: [query.replace(/\s+/g, '').toLowerCase()],
          resultsLimit: resultsLimit,
          resultsType: "posts"
        })
      }
    );

    if (!runResp.ok) {
      // Fallback: try apify/instagram-scraper (older but widely available)
      const fallbackResp = await fetch(
        `https://api.apify.com/v2/acts/apify~instagram-scraper/runs?token=${token}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            search: query,
            searchType: "hashtag",
            resultsLimit: resultsLimit,
            searchLimit: 1
          })
        }
      );
      if (!fallbackResp.ok) throw new Error('Failed to start scraper. Check your Apify token and try again.');
      var runData = await fallbackResp.json();
    } else {
      var runData = await runResp.json();
    }

    const datasetId = runData.data?.defaultDatasetId;
    if (!datasetId) throw new Error('No dataset returned from Apify');

    // Poll for results
    btn.textContent = 'Scraping Instagram...';
    let items = [];
    for (let attempt = 0; attempt < 30; attempt++) {
      await new Promise(r => setTimeout(r, 3000));
      const itemsResp = await fetch(
        `https://api.apify.com/v2/datasets/${datasetId}/items?token=${token}&limit=${resultsLimit}&format=json`
      );
      items = await itemsResp.json();
      if (items.length > 0) break;
      btn.textContent = `Scraping Instagram... (${(attempt+1)*3}s)`;
    }

    if (items.length === 0) throw new Error('No results found. Try a different search term.');

    // Transform to our format -- handle multiple possible Apify actor output formats
    const niceName = query.charAt(0).toUpperCase() + query.slice(1);
    const newReels = items.map(item => {
      // Handle different field naming conventions from various Apify actors
      const id = item.id || item.shortCode || item.pk || ('ig_' + Math.random().toString(36).slice(2));
      const caption = item.caption || item.text || item.description || '';
      const likes = item.likesCount || item.likes || item.diggCount || 0;
      const views = item.videoViewCount || item.viewsCount || item.playCount || item.views || 0;
      const comments = item.commentsCount || item.comments || item.commentCount || 0;
      const username = item.ownerUsername || item.username || item.author || item.ownerFullName || '';
      const fullName = item.ownerFullName || item.fullName || item.authorNickname || username;
      const url = item.url || item.webVideoUrl || (item.shortCode ? `https://www.instagram.com/reel/${item.shortCode}/` : '');
      const displayUrl = item.displayUrl || item.thumbnailUrl || item.coverUrl || '';
      const timestamp = item.timestamp || item.createTimeISO || item.takenAtTimestamp
        ? new Date((item.takenAtTimestamp || 0) * 1000).toISOString()
        : new Date().toISOString();
      const duration = item.videoDuration || item.duration || item.videoMeta?.duration || 0;
      const type = item.type || (item.isVideo ? 'Reel' : 'Post');

      return {
        id, category: niceName, caption, likesCount: likes,
        viewsCount: views, commentsCount: comments,
        username, fullName, url, displayUrl, timestamp,
        videoDuration: duration, type
      };
    }).filter(v => v.id && v.url);

    currentVideos = newReels;
    buildFilterButtons();
    renderCards('all', document.getElementById('sort-select').value);
    document.getElementById('subtitle').textContent = `${newReels.length} reels found for "${query}"`;

  } catch (err) {
    document.getElementById('subtitle').textContent = `Error: ${err.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search Reels';
    loadingBar.classList.remove('active');
  }
}

// Enter key triggers search
document.getElementById('niche-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') searchNiche();
});
